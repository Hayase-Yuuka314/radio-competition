# BPSK 稳健档 (P1) 物理层配置

profile:
  id: p1_robust
  description: "BPSK robust baseline — conservative synchronization and strong FEC"

  modulation: bpsk
  fec_type: convolutional
  fec_rate: 0.5

  samples_per_symbol: 8
  rrc_rolloff: 0.35
  rrc_span: 6

  preamble_length_symbols: 64
  guard_length_symbols: 16

  # 同步参数
  cfo_search_range_hz: 5000.0
  cfo_search_step_hz: 100.0
  timing_damping: 0.707
  timing_loop_bw: 0.01
  frame_detection_threshold: 0.3

  # FEC
  fec_max_iterations: 25

  # 滤波
  enable_notch: false
  notch_frequency_hz: 0.0
  notch_bandwidth_hz: 0.0

  # 协议
  block_size_bytes: 256
  interleave_block_size: 0
  file_id: 0
  session_id: 0
